changelog:
    exclude:
        labels:
            - ignore-for-release
        authors:
            - octocat
            - github-actions[bot]
    categories:
        - title: 🛠️ Breaking Changes
          labels:
              - breaking
        - title: 🎉 New Features
          labels:
              - type:feat
        - title: ✨ Improvements
          labels:
              - type:improvement
        - title: 🐞 Bug fixes
          labels:
              - type:fix
        - title: Other Changes
          labels:
              - "*"
